<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSA Toolbox</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #10233d;
      --muted: #52627a;
      --accent: #0f5b9e;
      --border: #d6deea;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      max-width: 760px;
      margin: 8vh auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(16, 35, 61, 0.08);
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.55;
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }

    ul {
      margin: 16px 0 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>PSA Toolbox</h1>
      <p>This repository’s web landing page lives in the Next.js app. Start the dev server from the repo root, then open <a href="http://127.0.0.1:3001">http://127.0.0.1:3001</a>.</p>
      <ul>
        <li><a href="README.md">Repository README</a></li>
        <li><a href="tools-manifest.json">Tool manifest</a></li>
        <li><a href="tools/">Tool folders</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
