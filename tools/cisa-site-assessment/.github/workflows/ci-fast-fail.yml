name: ci-fast-fail

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  fast-fail:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fast-fail checks
        run: npm run ci:fast-fail
