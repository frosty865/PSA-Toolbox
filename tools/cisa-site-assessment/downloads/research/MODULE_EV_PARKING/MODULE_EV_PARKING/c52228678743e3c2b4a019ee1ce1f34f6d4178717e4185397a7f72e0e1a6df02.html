n","displayName":"Victoria Hutchison","fields":{"AuthorReadMoreLinkLabel":{"value":""},"AuthorSummary":{"value":"NFPA Research Project Manager"},"AuthorEmail":{"value":"vhutchison@nfpa.org"},"AuthorName":{"value":"Victoria Hutchison Lutz"},"AuthorJobTitle":{"value":"Research Project Manager"},"AuthorImage":{"value":{"src":"/-/media/Project/Storefront/Catalog/Images/Blogs/Authors/Victoria_Hutchison_Profile.jpg?h=200\u0026iar=0\u0026w=200\u0026rev=d76fc35e6fc14ad1bcf2618fdfd0acd3\u0026hash=8A9B0DE284913F848A59725DE0F41DBD","width":"200","height":"200"}},"AuthorReadMoreLinkTarget":null,"Import ID":{"value":"{5C60CFD6-BDD0-4BDE-B819-13E708D1FDF8}"},"DevExManaged":{"value":false}}},"PublicationDate":{"value":"2024-07-12T13:27:00Z"},"PublicationMainImage":{"value":{"src":"/-/media/Project/Storefront/Catalog/Images/Blogs/BLS/modern-car-in-garage.png?h=575\u0026iar=0\u0026w=1150\u0026rev=cb3c43a4c0c64f8a88e8c5d50428a780\u0026hash=DE9D879613196B2267FCB79DF45E645C","alt":"A modern vehicle is seen parked inside a parking garage.","caption":"Today's vehicles contain roughly three times the amount of plastics that they did in the 1970s.","width":"1150","height":"575"}},"PublicationLegacyID":{"value":""},"HideForRSS":{"value":false},"Breadcrumb Custom Link":{"value":{"href":""}},"Show breadcrumb on this page":{"value":true},"Do not show this page on breadcrumb of other pages":{"value":false},"Page Design":null,"Import ID":{"value":""},"Secured":{"value":false},"Require Member Access":{"value":false},"Require No Membership":{"value":false},"Title":{"value":"Research Insights: Fire Safety for Electric Vehicles and Other Modern Vehicles in Parking Structures"},"Content":{"value":"\u003cp style=\"color: #000000; margin: 0in;\"\u003eOver the past five years, the electric vehicle (EV) market has seen substantial growth, with global sales reaching 10 million in 2023 and EV market share rising to 14 percent. Advances in battery technology, falling costs, supportive government policies, and expanded charging infrastructure have driven this growth. Major automakers have committed to EVs, offering more model options, while consumer awareness and demand for sustainable transport have surged, particularly in Europe, China, and North America.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003eRecent changes in vehicle design, materials, and motor technologies, however, have raised concerns in the fire protection community. Vehicles have become heavier and now incorporate substantially more plastic components. The shift to battery electric vehicles (BEVs), hydrogen fuel cells, and hybrid vehicles also introduces different fire hazards compared to traditional internal combustion engine (ICE) vehicles, potentially requiring modifications to traditional fire protection design strategies and firefighting tactics applied in parking structures.\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003eWhile vehicle fires are common, large-scale parking garage fires are rare but can cause significant economic losses, as seen in incidents at Liverpool\u0026rsquo;s Echo Arena, Stavanger Airport, and Luton Airport. In August, a fire involving an EV in a parking garage in South Korea damaged hundreds of vehicles and forced nearby residents to evacuate, \u003ca href=\"https://www.wsj.com/business/autos/huge-fire-sparked-by-a-mercedes-benz-ev-adds-to-safety-concerns-dogging-industry-8143d058\"\u003etriggering debate over whether EVs should be allowed in the country's underground parking garages\u003c/a\u003e.\u0026nbsp;\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003e\u003cstrong\u003e\u003cspan style=\"color: #c00000;\"\u003eRELATED:\u003c/span\u003e\u003c/strong\u003e \u003ca href=\"/en/for-professionals/training-for-me/buy-alternative-fuel-vehicles-training\"\u003eExplore training from NFPA related to alternative fuel vehicles\u003c/a\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003eThese events highlight the need to reclassify vehicle fire hazards and reevaluate recommended protection measures. \u003c/span\u003eAs a result, stakeholders have been coming to NFPA\u003csup\u003e\u0026reg;\u003c/sup\u003e and the Fire Protection Research Foundation (FPRF), the research affiliate of NFPA, with questions around the fire safety impact of EVs in parking structures. Some of the most frequently asked questions include:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003eHow do modern vehicles differ from legacy vehicles? How have they changed?\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003eHow does the fire hazard of an EV compare to an ICE vehicle?\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003eIs the current protection guidance in applicable codes and standards adequate?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eTo answer these questions, the Fire Protection Research Foundation conducted a Phase II \u003ca href=\"/en/education-and-research/research/fire-protection-research-foundation/Projects-and-Reports/modern-vehicle-hazards-in-parking-garages-vehicle-carriers\"\u003eresearch study\u003c/a\u003e, following up on a preliminary literature review from 2020, to provide data and insight to these questions and identify knowledge gaps that needs to be filled through an experimental test program. So, let\u0026rsquo;s dig into some of our key findings.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eHow do modern vehicles differ from legacy vehicles? How have they changed?\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eIn 2021, the average vehicle contained 411 lbs (186 kg) of plastics, constituting 9.6 percent of a vehicle\u0026rsquo;s total weight. In the 1970s, plastics made up less than 3 percent of the average vehicle\u0026rsquo;s weight.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThis increase in plastic content has the potential to enhance the combustible energy in a fire, potentially leading to higher heat release rates, longer burning durations, and greater risk of fire spread in parking garages compared to older vehicles. Thus, fire test data from older vehicles may not fully represent modern vehicles, which have a higher plastic content. This difference could impact the applicability of the test results to current vehicle fire scenarios and design fires.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eHow does the hazard of an EV compare to an ICE vehicle?\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe heat release rate is the most common measure used to characterize the amount of energy a fire produces over time, or more simply, the speed at which a fire burns fuel and releases heat. While experimental test results show that an ICE vehicle fire and an EV fire may have different peak heat release rates, their total heat release is similar for both vehicle types, meaning they pose a similar overall hazard.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eWhile ignition method, location, vehicle age and composition, ventilation conditions, and other factors have a significant influence on fire development and overall hazard, review of the available testing literature has found vehicle fires, both ICEVs and BEVs, too often exceed a heat flux threshold of 25 kW/m\u003csup\u003e2\u003c/sup\u003e (which is the exposure threshold for ignition of nearby combustibles), which suggests a high risk of fire spread to adjacent vehicles without sprinkler protection, regardless of these conditions.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eA summary of key differences between EVs and ICEVs are provided in the table below.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan style=\"color: #c00000;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003ctable border=\"0\" cellspacing=\"0\" cellpadding=\"0\" width=\"647\" style=\"width: 485.6pt;\"\u003e\n    \u003ctbody\u003e\n        \u003ctr style=\"height: 19.5pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"background: black; height: 19.5pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: 1pt solid black; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"background: black; height: 19.5pt; width: 189pt; padding: 0.05in 0.1in; border-top: 1pt solid black; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: white;\"\u003eEV\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"background: black; height: 19.5pt; width: 189pt; padding: 0.05in 0.1in; border-top: 1pt solid black; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: white;\"\u003eICE\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 13.65pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 13.65pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eFuel Source\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 13.65pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eLithium-ion batteries\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 13.65pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eGasoline\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eFire Causes\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eShort circuit, puncture, overheating, overcharging, over-discharging\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eFuel or oil leak, overheating, worn out parts, loose electrical components\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 14.1pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 14.1pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eSuppression Time\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 14.1pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e~60\u0026ndash;90+ min\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 14.1pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e~30 min\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eWater Usage (manual)\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eReports of up to thousands of gallons of water have been used, requiring sustained water supply\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u0026sim;\u003c/span\u003e\u003cspan style=\"color: black;\"\u003e500 gallons\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eReignition Potential\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eLikely, and fairly common\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eRare\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eFire Size\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Heat Release Rate: 1.5\u0026ndash;8\u003csup\u003e+\u003c/sup\u003e MW\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Total Heat Release: 5.9 GJ\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eCan be large if the initiating vehicle fire is allowed to propagate to an adjacent vehicle, but fires can typically be contained to one vehicle with protection by automatic sprinklers or intervention by the fire service prior to spread\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Heat Release Rate: 6.5\u0026ndash;8 MW\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Total Heat Release: 5.9 GJ\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eCan be large if the initiating vehicle fire is allowed to propagate to an adjacent vehicle, but fires can typically be contained to one vehicle with protection by automatic sprinklers or intervention by the fire service prior to spread\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eToxicity of Runoff\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eWater runoff has a pH of 7.3\u0026ndash;7.7\u003cstrong\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u003cstrong\u003e\u003c/strong\u003eCopper, antimony, and higher concentrations \u003c/span\u003e\u003cspan style=\"color: black;\"\u003eof manganese, nickel, cobalt, hydrogen \u003c/span\u003e\u003cspan style=\"color: black;\"\u003efluoride, and lithium\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eWater runoff has a pH of 2.6\u0026ndash;2.8\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eHigher concentrations of lead, copper, polycyclic aromatic hydrocarbons, and volatile organic compounds, testing showed higher toxicity towards aquatic species\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eSpecial Post-Fire\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eConsiderations\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eOften towed and recommended to be placed 50 ft away\u003cstrong\u003e \u003c/strong\u003efrom all surroundings (due to reignition risk)\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eVehicles/engines should be inspected\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eto see how much damage was done to\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003edetermine if repairs can occur\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eAdditional Hazards\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eStranded energy (reignition risk), electrocution risk, handling by secondary responders, projectiles and explosions, toxic gas release\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eToxic gas release, lots of combustible\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003efuel still accessible to the fire (i.e., a\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003efull gas tank)\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eIs the current protection guidance in applicable codes and standards appropriate?\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe codes and standards related to parking garage fire protection have evolved. Per \u003ca href=\"https://www.nfpa.org/en/codes-and-standards/nfpa-88a-standard-development/88a\"\u003eNFPA 88A, \u003cem\u003eStandard for Parking Structures\u003c/em\u003e\u003c/a\u003e, sprinkler protection is now required in all parking structures. Additionally, many codes and standards have increased the required sprinkler density for parking garages; most notably \u003ca href=\"https://www.nfpa.org/en/codes-and-standards/nfpa-13-standard-development/13\"\u003eNFPA 13, \u003cem\u003eStandard for the Installation of Automatic Sprinkler Systems\u003c/em\u003e\u003c/a\u003e, has changed the classification of parking garages from Ordinary Hazard Group 1 (~0.15 gpm/ft\u003csup\u003e2\u003c/sup\u003e) to Ordinary Hazard Group 2 (~0.2 gpm/ft\u003csup\u003e2\u003c/sup\u003e).\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe FPRF review of the codes and standards, though, revealed that there are very few national requirements for fire protection for automated parking structures or vertical stackers over two-tiers high. This has led some municipalities to enact their own to create local fire protection requirements for these types of parking structures.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe literature review identified a few vehicle fire tests that included sprinklers and aimed to determine if sprinklers could prevent fire spread to adjacent vehicles. One study by Arvidson and Westlund used sprinklers with a density of 10 mm/minute, between Ordinary Hazard Group 2 and Extra Hazard Group 1 design densities in the U.S. They measured heat flux at 500 mm (1.64 ft) for four tests, with two ICEVs and two BEVs, and found that the BEV fires did not spread to neighboring vehicles. Another study by the Building Research Establishment (BRE) used a sprinkler system with a British Standard Ordinary Hazard Group 2 density (which is between Light and Ordinary Hazard Group 1 density in the U.S.) and found that the vehicle fire did not spread to nearby vehicles under that protection. However, a similar test without sprinklers showed fire spreading to all three vehicles.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eData on sprinkler effects on vehicle fires and effective density to prevent spread in parking garages is limited. However, existing data indicates that sprinklers can control fires and limit them to the initial vehicle, though the optimal design density is still unknown. More research is needed to properly design sprinkler systems to prevent vehicle-to-vehicle fire spread in parking garages.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eNext steps\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThrough the comprehensive review and analysis of parking structure characteristics, fire statistics, incident case studies, evolution of vehicle composition, codes and standards, and the latest full-scale fire test data, three key gaps emerged:\u003cbr /\u003e\n\u003cstrong\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eNFPA 13 Hazard Classification for Modern Vehicles\u003c/strong\u003e: The current NFPA 13 hazard classification for modern vehicles in parking garages lacks testing data to support its accuracy. Despite evolving codes and standards requiring sprinklers in new parking garages and increasing the necessary sprinkler water density, the technical justification for these water density selections remains unclear.\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eWorst-Case Scenario Conditions\u003c/strong\u003e: The specific conditions leading to the worst-case scenario for vehicle fires in parking garages are not well understood. Variables such as vehicle size and type, fire ignition location, sprinkler placement, window positions, and other configuration-specific details can significantly affect fire development and spread.\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eFire Safety in Vertical Vehicle Stackers and Automated Parking Structures\u003c/strong\u003e: There is a notable deficiency in experimental data regarding fire safety in modern vehicles parked in vertical stackers and automated parking structures. Existing data and guidance on proper fire safety measures in these types of parking facilities are extremely limited.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eTo address these knowledge gaps, a testing plan was developed, outlining a test matrix, necessary data, and evaluation criteria. The Fire Protection Research Foundation\u0026rsquo;s proposed testing initiatives aim to enhance our understanding of fire hazards in parking structures and improve fire protection strategies, ultimately ensuring safer environments as vehicle technologies and parking facility designs continue to evolve.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eTo learn more, \u003ca href=\"/en/education-and-research/research/fire-protection-research-foundation/Projects-and-Reports/modern-vehicle-hazards-in-parking-garages-vehicle-carriers\"\u003edownload the final report\u003c/a\u003e.\u003c/p\u003e"},"metaDescription":{"value":"A Fire Protection Research Foundation report examined electric vehicle fires and the risks they present in parking garages. "},"noFollow":{"value":false},"noIndex":{"value":false},"pageTitle":{"value":"Parking Garages and EVs"},"addTitleSuffix":{"value":false},"RTL":{"value":false},"metaImage":{"value":{}},"CardImage":{"value":{}},"CardText":{"value":"A FPRF report examined electric vehicle fires in parking garages."},"CardButtonText":{"value":""},"Title Image":{"value":{}},"Taxonomies":[{"id":"c309afae-6694-46f4-b834-98ef67785d4d","url":"/en/Data/Taxonomies/Topics/Research","name":"Research","displayName":"Research","fields":{"Title":{"value":"Research"},"Notes":{"value":""},"Import ID":{"value":"Research"},"DevExManaged":{"value":false}}},{"id":"6c2415a4-42b1-40d7-87ec-2ff36602be6c","url":"/en/Data/Taxonomies/Topics/Fire-Protection-Systems","name":"Fire Protection Systems","displayName":"Fire Protection Systems","fields":{"Title":{"value":"Fire Protection Systems"},"Notes":{"value":""},"Import ID":{"value":"Fire Protection Systems"},"DevExManaged":{"value":false}}},{"id":"d06c492d-67b0-4468-8ada-959c7e724282","url":"/en/Data/Taxonomies/Topics/Electrical","name":"Electrical","displayName":"Electrical","fields":{"Title":{"value":"Electrical"},"Notes":{"value":""},"Import ID":{"value":"Electrical"},"DevExManaged": rch Project Manager"},"AuthorImage":{"value":{"src":"https://content.nfpa.org/-/media/Project/Storefront/Catalog/Images/Blogs/Authors/Victoria_Hutchison_Profile.jpg?h=200\u0026iar=0\u0026w=200\u0026rev=d76fc35e6fc14ad1bcf2618fdfd0acd3\u0026hash=8A9B0DE284913F848A59725DE0F41DBD","width":"200","height":"200"}},"AuthorReadMoreLinkTarget":null,"Import ID":{"value":"{5C60CFD6-BDD0-4BDE-B819-13E708D1FDF8}"},"DevExManaged":{"value":false}}},"PublicationDate":{"value":"2024-07-12T13:27:00Z"},"PublicationMainImage":{"value":{"src":"https://content.nfpa.org/-/media/Project/Storefront/Catalog/Images/Blogs/BLS/modern-car-in-garage.png?h=575\u0026iar=0\u0026w=1150\u0026rev=cb3c43a4c0c64f8a88e8c5d50428a780\u0026hash=DE9D879613196B2267FCB79DF45E645C","alt":"A modern vehicle is seen parked inside a parking garage.","caption":"Today's vehicles contain roughly three times the amount of plastics that they did in the 1970s.","width":"1150","height":"575"}},"PublicationLegacyID":{"value":""},"HideForRSS":{"value":false},"Breadcrumb Custom Link":{"value":{"href":""}},"Show breadcrumb on this page":{"value":true},"Do not show this page on breadcrumb of other pages":{"value":false},"Page Design":null,"Import ID":{"value":""},"Secured":{"value":false},"Require Member Access":{"value":false},"Require No Membership":{"value":false},"Title":{"value":"Research Insights: Fire Safety for Electric Vehicles and Other Modern Vehicles in Parking Structures"},"Content":{"value":"\u003cp style=\"color: #000000; margin: 0in;\"\u003eOver the past five years, the electric vehicle (EV) market has seen substantial growth, with global sales reaching 10 million in 2023 and EV market share rising to 14 percent. Advances in battery technology, falling costs, supportive government policies, and expanded charging infrastructure have driven this growth. Major automakers have committed to EVs, offering more model options, while consumer awareness and demand for sustainable transport have surged, particularly in Europe, China, and North America.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003eRecent changes in vehicle design, materials, and motor technologies, however, have raised concerns in the fire protection community. Vehicles have become heavier and now incorporate substantially more plastic components. The shift to battery electric vehicles (BEVs), hydrogen fuel cells, and hybrid vehicles also introduces different fire hazards compared to traditional internal combustion engine (ICE) vehicles, potentially requiring modifications to traditional fire protection design strategies and firefighting tactics applied in parking structures.\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003eWhile vehicle fires are common, large-scale parking garage fires are rare but can cause significant economic losses, as seen in incidents at Liverpool\u0026rsquo;s Echo Arena, Stavanger Airport, and Luton Airport. In August, a fire involving an EV in a parking garage in South Korea damaged hundreds of vehicles and forced nearby residents to evacuate, \u003ca href=\"https://www.wsj.com/business/autos/huge-fire-sparked-by-a-mercedes-benz-ev-adds-to-safety-concerns-dogging-industry-8143d058\"\u003etriggering debate over whether EVs should be allowed in the country's underground parking garages\u003c/a\u003e.\u0026nbsp;\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003e\u003cstrong\u003e\u003cspan style=\"color: #c00000;\"\u003eRELATED:\u003c/span\u003e\u003c/strong\u003e \u003ca href=\"/en/for-professionals/training-for-me/buy-alternative-fuel-vehicles-training\"\u003eExplore training from NFPA related to alternative fuel vehicles\u003c/a\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan class=\"ui-provider\"\u003eThese events highlight the need to reclassify vehicle fire hazards and reevaluate recommended protection measures. \u003c/span\u003eAs a result, stakeholders have been coming to NFPA\u003csup\u003e\u0026reg;\u003c/sup\u003e and the Fire Protection Research Foundation (FPRF), the research affiliate of NFPA, with questions around the fire safety impact of EVs in parking structures. Some of the most frequently asked questions include:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003eHow do modern vehicles differ from legacy vehicles? How have they changed?\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003eHow does the fire hazard of an EV compare to an ICE vehicle?\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003eIs the current protection guidance in applicable codes and standards adequate?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eTo answer these questions, the Fire Protection Research Foundation conducted a Phase II \u003ca href=\"/en/education-and-research/research/fire-protection-research-foundation/Projects-and-Reports/modern-vehicle-hazards-in-parking-garages-vehicle-carriers\"\u003eresearch study\u003c/a\u003e, following up on a preliminary literature review from 2020, to provide data and insight to these questions and identify knowledge gaps that needs to be filled through an experimental test program. So, let\u0026rsquo;s dig into some of our key findings.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eHow do modern vehicles differ from legacy vehicles? How have they changed?\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eIn 2021, the average vehicle contained 411 lbs (186 kg) of plastics, constituting 9.6 percent of a vehicle\u0026rsquo;s total weight. In the 1970s, plastics made up less than 3 percent of the average vehicle\u0026rsquo;s weight.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThis increase in plastic content has the potential to enhance the combustible energy in a fire, potentially leading to higher heat release rates, longer burning durations, and greater risk of fire spread in parking garages compared to older vehicles. Thus, fire test data from older vehicles may not fully represent modern vehicles, which have a higher plastic content. This difference could impact the applicability of the test results to current vehicle fire scenarios and design fires.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eHow does the hazard of an EV compare to an ICE vehicle?\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe heat release rate is the most common measure used to characterize the amount of energy a fire produces over time, or more simply, the speed at which a fire burns fuel and releases heat. While experimental test results show that an ICE vehicle fire and an EV fire may have different peak heat release rates, their total heat release is similar for both vehicle types, meaning they pose a similar overall hazard.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eWhile ignition method, location, vehicle age and composition, ventilation conditions, and other factors have a significant influence on fire development and overall hazard, review of the available testing literature has found vehicle fires, both ICEVs and BEVs, too often exceed a heat flux threshold of 25 kW/m\u003csup\u003e2\u003c/sup\u003e (which is the exposure threshold for ignition of nearby combustibles), which suggests a high risk of fire spread to adjacent vehicles without sprinkler protection, regardless of these conditions.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eA summary of key differences between EVs and ICEVs are provided in the table below.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cspan style=\"color: #c00000;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003ctable border=\"0\" cellspacing=\"0\" cellpadding=\"0\" width=\"647\" style=\"width: 485.6pt;\"\u003e\n    \u003ctbody\u003e\n        \u003ctr style=\"height: 19.5pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"background: black; height: 19.5pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: 1pt solid black; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"background: black; height: 19.5pt; width: 189pt; padding: 0.05in 0.1in; border-top: 1pt solid black; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: white;\"\u003eEV\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"background: black; height: 19.5pt; width: 189pt; padding: 0.05in 0.1in; border-top: 1pt solid black; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: white;\"\u003eICE\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 13.65pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 13.65pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eFuel Source\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 13.65pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eLithium-ion batteries\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 13.65pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eGasoline\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eFire Causes\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eShort circuit, puncture, overheating, overcharging, over-discharging\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eFuel or oil leak, overheating, worn out parts, loose electrical components\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 14.1pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 14.1pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eSuppression Time\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 14.1pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e~60\u0026ndash;90+ min\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 14.1pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e~30 min\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eWater Usage (manual)\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eReports of up to thousands of gallons of water have been used, requiring sustained water supply\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u0026sim;\u003c/span\u003e\u003cspan style=\"color: black;\"\u003e500 gallons\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eReignition Potential\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eLikely, and fairly common\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eRare\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eFire Size\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Heat Release Rate: 1.5\u0026ndash;8\u003csup\u003e+\u003c/sup\u003e MW\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Total Heat Release: 5.9 GJ\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eCan be large if the initiating vehicle fire is allowed to propagate to an adjacent vehicle, but fires can typically be contained to one vehicle with protection by automatic sprinklers or intervention by the fire service prior to spread\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Heat Release Rate: 6.5\u0026ndash;8 MW\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eAvg Total Heat Release: 5.9 GJ\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eCan be large if the initiating vehicle fire is allowed to propagate to an adjacent vehicle, but fires can typically be contained to one vehicle with protection by automatic sprinklers or intervention by the fire service prior to spread\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eToxicity of Runoff\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eWater runoff has a pH of 7.3\u0026ndash;7.7\u003cstrong\u003e\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u003cstrong\u003e\u003c/strong\u003eCopper, antimony, and higher concentrations \u003c/span\u003e\u003cspan style=\"color: black;\"\u003eof manganese, nickel, cobalt, hydrogen \u003c/span\u003e\u003cspan style=\"color: black;\"\u003efluoride, and lithium\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eWater runoff has a pH of 2.6\u0026ndash;2.8\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003e\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eHigher concentrations of lead, copper, polycyclic aromatic hydrocarbons, and volatile organic compounds, testing showed higher toxicity towards aquatic species\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eSpecial Post-Fire\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eConsiderations\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eOften towed and recommended to be placed 50 ft away\u003cstrong\u003e \u003c/strong\u003efrom all surroundings (due to reignition risk)\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eVehicles/engines should be inspected\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eto see how much damage was done to\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003edetermine if repairs can occur\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr style=\"height: 29.2pt;\"\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 107.6pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: 1pt solid black; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cstrong\u003e\u003cspan style=\"color: black;\"\u003eAdditional Hazards\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: none; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eStranded energy (reignition risk), electrocution risk, handling by secondary responders, projectiles and explosions, toxic gas release\u003c/span\u003e\u003c/p\u003e\n            \u003c/td\u003e\n            \u003ctd valign=\"top\" style=\"height: 29.2pt; width: 189pt; padding: 0.05in 0.1in; border-top: none; border-right: 1pt solid black; border-bottom: 1pt solid black; border-left: none; text-align: left;\"\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003eToxic gas release, lots of combustible\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003efuel still accessible to the fire (i.e., a\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u003cspan style=\"color: black;\"\u003efull gas tank)\u003c/span\u003e\u003c/p\u003e\n            \u003cp style=\"margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n            \u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eIs the current protection guidance in applicable codes and standards appropriate?\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe codes and standards related to parking garage fire protection have evolved. Per \u003ca href=\"https://www.nfpa.org/en/codes-and-standards/nfpa-88a-standard-development/88a\"\u003eNFPA 88A, \u003cem\u003eStandard for Parking Structures\u003c/em\u003e\u003c/a\u003e, sprinkler protection is now required in all parking structures. Additionally, many codes and standards have increased the required sprinkler density for parking garages; most notably \u003ca href=\"https://www.nfpa.org/en/codes-and-standards/nfpa-13-standard-development/13\"\u003eNFPA 13, \u003cem\u003eStandard for the Installation of Automatic Sprinkler Systems\u003c/em\u003e\u003c/a\u003e, has changed the classification of parking garages from Ordinary Hazard Group 1 (~0.15 gpm/ft\u003csup\u003e2\u003c/sup\u003e) to Ordinary Hazard Group 2 (~0.2 gpm/ft\u003csup\u003e2\u003c/sup\u003e).\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe FPRF review of the codes and standards, though, revealed that there are very few national requirements for fire protection for automated parking structures or vertical stackers over two-tiers high. This has led some municipalities to enact their own to create local fire protection requirements for these types of parking structures.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThe literature review identified a few vehicle fire tests that included sprinklers and aimed to determine if sprinklers could prevent fire spread to adjacent vehicles. One study by Arvidson and Westlund used sprinklers with a density of 10 mm/minute, between Ordinary Hazard Group 2 and Extra Hazard Group 1 design densities in the U.S. They measured heat flux at 500 mm (1.64 ft) for four tests, with two ICEVs and two BEVs, and found that the BEV fires did not spread to neighboring vehicles. Another study by the Building Research Establishment (BRE) used a sprinkler system with a British Standard Ordinary Hazard Group 2 density (which is between Light and Ordinary Hazard Group 1 density in the U.S.) and found that the vehicle fire did not spread to nearby vehicles under that protection. However, a similar test without sprinklers showed fire spreading to all three vehicles.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eData on sprinkler effects on vehicle fires and effective density to prevent spread in parking garages is limited. However, existing data indicates that sprinklers can control fires and limit them to the initial vehicle, though the optimal design density is still unknown. More research is needed to properly design sprinkler systems to prevent vehicle-to-vehicle fire spread in parking garages.\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eNext steps\u003c/strong\u003e\u003c/h2\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eThrough the comprehensive review and analysis of parking structure characteristics, fire statistics, incident case studies, evolution of vehicle composition, codes and standards, and the latest full-scale fire test data, three key gaps emerged:\u003cbr /\u003e\n\u003cstrong\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eNFPA 13 Hazard Classification for Modern Vehicles\u003c/strong\u003e: The current NFPA 13 hazard classification for modern vehicles in parking garages lacks testing data to support its accuracy. Despite evolving codes and standards requiring sprinklers in new parking garages and increasing the necessary sprinkler water density, the technical justification for these water density selections remains unclear.\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eWorst-Case Scenario Conditions\u003c/strong\u003e: The specific conditions leading to the worst-case scenario for vehicle fires in parking garages are not well understood. Variables such as vehicle size and type, fire ignition location, sprinkler placement, window positions, and other configuration-specific details can significantly affect fire development and spread.\u003c/li\u003e\n    \u003cli style=\"color: #000000; margin: 0in;\"\u003e\u003cstrong\u003eFire Safety in Vertical Vehicle Stackers and Automated Parking Structures\u003c/strong\u003e: There is a notable deficiency in experimental data regarding fire safety in modern vehicles parked in vertical stackers and automated parking structures. Existing data and guidance on proper fire safety measures in these types of parking facilities are extremely limited.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp style=\"color: #000000; margin: 0in;\"\u003eTo address these knowledge gaps, a testing plan was developed, outlining a test matrix, necessary data, and evaluation criteria. The Fire Protection Research Foundation\u0026rsquo;s proposed testing initiatives aim to enhance our understanding of fire hazards in parking structures and improve fire protection strategies, ultimately ensuring safer environments as vehicle technologies and parking facility design
