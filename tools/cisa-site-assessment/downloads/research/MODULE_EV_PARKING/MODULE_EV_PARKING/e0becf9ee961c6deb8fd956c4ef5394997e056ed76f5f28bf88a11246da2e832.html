eferrer\" href=\"https://www.iea.org/commentaries/electric-cars-fend-off-supply-challenges-to-more-than-double-global-sales\" target=\"_blank\"\u003ehitting 6.6 million in 2021\u003c/a\u003e, which is more than triple their market share from two years earlier. While this might be good news for our environment, it also brings unique fire challenges to both first responders and fire protection designers.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe lithium-ion (or similar) batteries inside of these vehicles fail and burn in a much different way than internal combustion engine (ICE) vehicles. When lithium-ion batteries fail, they go through a process called thermal runaway, where a single cell failure can cause the production of heat and oxygen as well as flammable and toxic gasses. This then spreads to adjacent cells causing potential rapid fire growth or explosion.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eTo give us some perspective about the size of this issue, it is estimated that there are around 16 million electric cars on the road worldwide, and \u003ca rel=\"noopener noreferrer\" href=\"https://www.evfiresafe.com/\" target=\"_blank\"\u003estudies have identified nearly 300 EV fires globally\u003c/a\u003e between 2010 and 2022. Compare this with ICE vehicle fires and we find that EV vehicle fires are less common of an occurrence, but more complicated of an event, since EVs fires can last longer and have the potential for electrical shock and reignition. While a majority of vehicle fires occur on the road, it\u0026rsquo;s the fires that occur in parking structures that lead to large economic loss as evidenced by recent fires at \u003ca rel=\"noopener noreferrer\" href=\"https://www.bbc.com/news/uk-england-manchester-42529615\" target=\"_blank\"\u003eLiverpool\u0026rsquo;s Echo Arena\u003c/a\u003e (UK) and at the \u003ca rel=\"noopener noreferrer\" href=\"https://europe.autonews.com/automakers/hundreds-cars-destroyed-fire-norway-airport\" target=\"_blank\"\u003eStavanger Airport\u003c/a\u003e (Norway).\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-size: 24px;\"\u003eWhat makes a parking garage or parking structure unique?\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003eParking garages, often called parking structures in code books, are a unique type of occupancy. They can be located underground or above ground and are usually located in congested urban areas where large open parking lots aren\u0026rsquo;t feasible. They can be public or private and store anything from motorcycles and cars to trucks and buses. There might be access for each vehicle to enter and exit or there might be vehicles covering the entire floor area.\u003cbr /\u003e\n\u003cbr /\u003e\n\u003c/p\u003e\n\u003chr /\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003e\n\u003cspan class=\"journal-captions\"\u003e\u003cstrong\u003eRELATED\u003c/strong\u003e\u003c/span\u003e: \u003ca rel=\"noopener noreferrer\" href=\"https://www.nfpa.org/News-and-Research/Publications-and-media/NFPA-Journal/2019/March-April-2019/Features/Protecting-Parking-Garages\" target=\"_blank\"\u003eRead a 2019 NFPA Journal feature story about the risks introduced to parking garages by modern vehicles\u003c/a\u003e\u0026nbsp;\u003c/p\u003e\n\u003chr /\u003e\n\u003cp\u003eThere can also be several different types of technology integrated into parking structures, such as car stackers or automated parking systems which store and retrieve vehicles without a driver. These types of technologies increase the efficiency of the space being used but also increase the potential hazard by placing vehicles closer together.\u003c/p\u003e\n\u003cp\u003eWith all of these variables already existing in parking structures, the introduction of electric vehicles and electric vehicle charging stations adds more considerations that need to be made when designing and protecting these occupancies.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003e\u003cspan style=\"font-size: 24px;\"\u003eWhat do the codes say?\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eWhat do the current codes and standard say about electric vehicles in parking garages? While they don\u0026rsquo;t go into much detail, there are some requirements in \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/70\" target=\"_blank\"\u003eNFPA 70\u0026reg;, \u003cem\u003eNational Electrical Code\u003c/em\u003e\u0026reg;\u003c/a\u003e (NEC\u0026reg;) and \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/88a\" target=\"_blank\"\u003eNFPA 88A, \u003cem\u003eStandard for Parking Structures\u003c/em\u003e\u003c/a\u003e, that address certain safety concerns.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe NEC is the go-to code when looking to protect people and property from electrical hazards and so, as appropriate, it has requirements for installing EV charging stations, or \u0026ldquo;Electric Vehicle Supply Equipment,\u0026rdquo; as they call it in the code.\u003c/p\u003e\n\u003cp\u003eWhen conducting service load calculations, Article 220 requires EV Supply Equipment to be calculated at either 7,200 watts or the nameplate rating of the equipment, whichever is larger. This is to ensure the electrical supply will be able to handle the extra load put on by EVs charging.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eMost of the other requirements for electric vehicle charging stations are going to be located in Article 625, \u003cem\u003eElectric Vehicle Power Transfer System\u003c/em\u003e. While this article contains many requirements, some of the highlights include requirements for EV charging equipment to be listed, to have a disconnecting means, and for charging coupling to be a minimum distance above the ground.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe other major standard that addresses EVs in parking structures is NFPA 88A. Similar to NFPA 70, it requires the charging stations and equipment to be listed but it gives more details into the exact listing standards it needs to meet.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 0in 0.75in;\"\u003e-\u003cspan\u003e\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp; \u003c/span\u003eElectric vehicle charging stations need to be listed to UL 2202, \u003cem\u003eStandard for Electric Vehicle (EV) Charging System Equipment\u003c/em\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 0in 0.75in;\"\u003e-\u003cspan\u003e\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp; \u003c/span\u003eElectric vehicle charging equipment need to be listed to UL 2594, \u003cem\u003eStandard for Electric Vehicle Supply Equipment\u003c/em\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt 0.75in;\"\u003e-\u003cspan\u003e\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp; \u003c/span\u003eWireless power transfer equipment needs to be listed to UL 2750, \u003cem\u003eUL LLC Outline of Investigation for Wireless Power Transfer Equipment for Electric Vehicles\u003c/em\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003e\u003cspan style=\"font-size: 24px;\"\u003eImpact of modern vehicles\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe introduction of EVs into the ecosystem isn\u0026rsquo;t the only thing to consider when looking at how to properly design and protect parking structures. The fire characteristics of modern vehicles are also changing to include more plastics and other combustibles than ever before. While this benefits the fuel economy and lowers vehicle price, it increases the fuel load and fire growth we see in parking garages. A \u003ca href=\"/en/education-and-research/research/fire-protection-research-foundation/Projects-and-Reports/modern-vehicle-hazards-in-parking-garages-vehicle-carriers\"\u003erecent Fire Protection Research Foundation report\u003c/a\u003e\u0026nbsp;dives into details about the fire hazard modern vehicles represent to parking garages and marine vessels. In addition, there have also been updates to various standards in response to these increased fire hazards found in parking garages. \u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe 2022 edition of \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/13\" target=\"_blank\"\u003eNFPA 13, \u003cem\u003eStandard for the Installation of Sprinkler Systems\u003c/em\u003e\u003c/a\u003e, for example, has changed to increase the recommended hazard classification for parking structures from an Ordinary Hazard Group 1 to an Ordinary Hazard Group 2. The effect is a 33 percent increase in the design density, moving from 0.15 gpm/ft\u003csup\u003e2\u003c/sup\u003e to 0.2 gpm/ft\u003csup\u003e2\u003c/sup\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eAs of January of 2021, FM Global data sheets have also increased the hazard category for parking garages and car parks from a Hazard Category 2 to a Hazard Category 3.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eNew to the 2023 edition of NFPA 88A, all parking garages are now required to have sprinkler systems installed in accordance with NFPA 13. Prior to this edition, sprinklers didn\u0026rsquo;t have to be installed in open parking structures.\u003c/p\u003e\n\u003cp\u003e\u003cspan\u003eWhile technology is constantly evolving, so are NFPA codes, standards, trainings, research, and other resources. The ever-growing presence of lithium-ion batteries in our day-to-day lives are changing the fire characteristics of our built environment. Fire protection professionals need to be able to stay on top of these changes to ensure the safety of people and property. For more information on the resources NFPA provides relates to electric vehicles, check out \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/EV\" target=\"_blank\"\u003enfpa.org/EV\u003c/a\u003e.\u003c/span\u003e\n\u003c/p\u003e"},"metaDescription":{"value":"How do EVs and other modern vehicles impact fire safety in parking garages"},"noFollow":{"value":false},"noIndex":{"value":false},"pageTitle":{"value":"EVs and Parking Garages | NFPA"},"addTitleSuffix":{"value":false},"RTL":{"value":false},"metaImage":{"value":{}},"CardImage":{"value":{"src":"/-/media/Project/Storefront/Catalog/Images/Blogs/BLS/parking-garage-hed.png?h=400\u0026iar=0\u0026w=800\u0026rev=7a6a56f3b5d6466ca3121884d958a664\u0026hash=A21C66BDB9EEE63265B80821127E4F21","width":"800","height":"400"}},"CardText":{"value":""},"CardButtonText":{"value":""},"Title Image":{"value":{"src":"/-/media/Project/Storefront/Catalog/Images/Blogs/BLS/parking-garage-hed.png?h=400\u0026iar=0\u0026w=800\u0026rev=7a6a56f3b5d6466ca3121884d958a664\u0026hash=A21C66BDB9EEE63265B80821127E4F21","width":"800","height":"400"}},"Taxonomies":[{"id":"b513a63a-7cba-43bc-986c-aeafc2aedc07","url":"/en/Data/Taxonomies/Topics/Subtopics/Appliances-and-electronics","name":"Appliances and electronics","displayName":"Appliances and electronics","fields":{"ParentTopics":[],"Title":{"value":"Appliances and electronics"},"Notes":{"value":""},"Import ID":{"value":"Appliances and electronics"},"DevExManaged":{"value":false}}},{"id":"1b8cf06f-4791-4df4-900f-2685d6af374e","url":"/en/Data/Taxonomies/Topics/Subtopics/Assembly-occupancies","name":"Assembly occupancies","displayName":"Assembly occupancies","fields":{"ParentTopics":[],"Title":{"value":"Assembly occupancies"},"Notes":{"value":""},"Import ID":{"value":"Assembly occupancies"},"DevExManaged":{"value":false}}},{"id":"5cf0ba21-6730-4590-8a62-66159d4425af","url":"/en/Data/Taxonomies/Topics/Subtopics/Buildings-and-structures","name":"Buildings and structures","displayName":"Buildings and structures","fields":{"ParentTopics":[],"Title":{"value":"Buildings and structures"},"Notes":{"value":""},"Import ID":{"value":"Buildings and structures"},"DevExManaged":{"value":false}}},{"id":"0296ab1b-4a 3b5d6466ca3121884d958a664\u0026hash=A21C66BDB9EEE63265B80821127E4F21","width":"800","height":"400"}},"PublicationLegacyID":{"value":"{035A4C53-BC71-41D1-900B-373B9235256A}"},"HideForRSS":{"value":false},"Breadcrumb Custom Link":{"value":{"href":""}},"Show breadcrumb on this page":{"value":true},"Do not show this page on breadcrumb of other pages":{"value":false},"Page Design":null,"Import ID":{"value":"{035A4C53-BC71-41D1-900B-373B9235256A}"},"Secured":{"value":false},"Require Member Access":{"value":false},"Require No Membership":{"value":false},"Title":{"value":"Fire Safety for Electric Vehicles and Other Modern Vehicles in Parking Structures"},"Content":{"value":"\u003cp\u003eIn spite of the global supply chain issues and loss of vehicles in the \u003ca rel=\"noopener noreferrer\" href=\"/news-blogs-and-articles/nfpa-journal/journal-articles\" target=\"_blank\"\u003eFelicity Ace cargo ship fire\u003c/a\u003e, the sales of electric vehicles (EVs) has been on the move, \u003ca rel=\"noopener noreferrer\" href=\"https://www.iea.org/commentaries/electric-cars-fend-off-supply-challenges-to-more-than-double-global-sales\" target=\"_blank\"\u003ehitting 6.6 million in 2021\u003c/a\u003e, which is more than triple their market share from two years earlier. While this might be good news for our environment, it also brings unique fire challenges to both first responders and fire protection designers.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe lithium-ion (or similar) batteries inside of these vehicles fail and burn in a much different way than internal combustion engine (ICE) vehicles. When lithium-ion batteries fail, they go through a process called thermal runaway, where a single cell failure can cause the production of heat and oxygen as well as flammable and toxic gasses. This then spreads to adjacent cells causing potential rapid fire growth or explosion.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eTo give us some perspective about the size of this issue, it is estimated that there are around 16 million electric cars on the road worldwide, and \u003ca rel=\"noopener noreferrer\" href=\"https://www.evfiresafe.com/\" target=\"_blank\"\u003estudies have identified nearly 300 EV fires globally\u003c/a\u003e between 2010 and 2022. Compare this with ICE vehicle fires and we find that EV vehicle fires are less common of an occurrence, but more complicated of an event, since EVs fires can last longer and have the potential for electrical shock and reignition. While a majority of vehicle fires occur on the road, it\u0026rsquo;s the fires that occur in parking structures that lead to large economic loss as evidenced by recent fires at \u003ca rel=\"noopener noreferrer\" href=\"https://www.bbc.com/news/uk-england-manchester-42529615\" target=\"_blank\"\u003eLiverpool\u0026rsquo;s Echo Arena\u003c/a\u003e (UK) and at the \u003ca rel=\"noopener noreferrer\" href=\"https://europe.autonews.com/automakers/hundreds-cars-destroyed-fire-norway-airport\" target=\"_blank\"\u003eStavanger Airport\u003c/a\u003e (Norway).\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-size: 24px;\"\u003eWhat makes a parking garage or parking structure unique?\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003eParking garages, often called parking structures in code books, are a unique type of occupancy. They can be located underground or above ground and are usually located in congested urban areas where large open parking lots aren\u0026rsquo;t feasible. They can be public or private and store anything from motorcycles and cars to trucks and buses. There might be access for each vehicle to enter and exit or there might be vehicles covering the entire floor area.\u003cbr /\u003e\n\u003cbr /\u003e\n\u003c/p\u003e\n\u003chr /\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003e\n\u003cspan class=\"journal-captions\"\u003e\u003cstrong\u003eRELATED\u003c/strong\u003e\u003c/span\u003e: \u003ca rel=\"noopener noreferrer\" href=\"https://www.nfpa.org/News-and-Research/Publications-and-media/NFPA-Journal/2019/March-April-2019/Features/Protecting-Parking-Garages\" target=\"_blank\"\u003eRead a 2019 NFPA Journal feature story about the risks introduced to parking garages by modern vehicles\u003c/a\u003e\u0026nbsp;\u003c/p\u003e\n\u003chr /\u003e\n\u003cp\u003eThere can also be several different types of technology integrated into parking structures, such as car stackers or automated parking systems which store and retrieve vehicles without a driver. These types of technologies increase the efficiency of the space being used but also increase the potential hazard by placing vehicles closer together.\u003c/p\u003e\n\u003cp\u003eWith all of these variables already existing in parking structures, the introduction of electric vehicles and electric vehicle charging stations adds more considerations that need to be made when designing and protecting these occupancies.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003e\u003cspan style=\"font-size: 24px;\"\u003eWhat do the codes say?\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eWhat do the current codes and standard say about electric vehicles in parking garages? While they don\u0026rsquo;t go into much detail, there are some requirements in \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/70\" target=\"_blank\"\u003eNFPA 70\u0026reg;, \u003cem\u003eNational Electrical Code\u003c/em\u003e\u0026reg;\u003c/a\u003e (NEC\u0026reg;) and \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/88a\" target=\"_blank\"\u003eNFPA 88A, \u003cem\u003eStandard for Parking Structures\u003c/em\u003e\u003c/a\u003e, that address certain safety concerns.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe NEC is the go-to code when looking to protect people and property from electrical hazards and so, as appropriate, it has requirements for installing EV charging stations, or \u0026ldquo;Electric Vehicle Supply Equipment,\u0026rdquo; as they call it in the code.\u003c/p\u003e\n\u003cp\u003eWhen conducting service load calculations, Article 220 requires EV Supply Equipment to be calculated at either 7,200 watts or the nameplate rating of the equipment, whichever is larger. This is to ensure the electrical supply will be able to handle the extra load put on by EVs charging.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eMost of the other requirements for electric vehicle charging stations are going to be located in Article 625, \u003cem\u003eElectric Vehicle Power Transfer System\u003c/em\u003e. While this article contains many requirements, some of the highlights include requirements for EV charging equipment to be listed, to have a disconnecting means, and for charging coupling to be a minimum distance above the ground.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe other major standard that addresses EVs in parking structures is NFPA 88A. Similar to NFPA 70, it requires the charging stations and equipment to be listed but it gives more details into the exact listing standards it needs to meet.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 0in 0.75in;\"\u003e-\u003cspan\u003e\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp; \u003c/span\u003eElectric vehicle charging stations need to be listed to UL 2202, \u003cem\u003eStandard for Electric Vehicle (EV) Charging System Equipment\u003c/em\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 0in 0.75in;\"\u003e-\u003cspan\u003e\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp; \u003c/span\u003eElectric vehicle charging equipment need to be listed to UL 2594, \u003cem\u003eStandard for Electric Vehicle Supply Equipment\u003c/em\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt 0.75in;\"\u003e-\u003cspan\u003e\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp; \u003c/span\u003eWireless power transfer equipment needs to be listed to UL 2750, \u003cem\u003eUL LLC Outline of Investigation for Wireless Power Transfer Equipment for Electric Vehicles\u003c/em\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003e\u003cspan style=\"font-size: 24px;\"\u003eImpact of modern vehicles\u003c/span\u003e\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eThe introduction of EVs into the ecosystem isn\u0026rsquo;t the only thing to consider when looking at how to properly design and protect parking structures. The fire characteristics of modern vehicles are also changing to include more plastics and other combustibles than ever before. While this benefits the fuel economy and lowers vehicle price, it increases the fuel load and fire growth we see in parking garages. A \u003ca href=\"/en/education-and-research/research/fire-protection-research-foundation/Projects-and-Reports/modern-vehicle-hazards-in-parking-garages-vehicle-carriers\"\u003erecent Fire Protection Research Foundation report\u003c/a\u003e\u0026nbsp;dives into details about the fire hazard modern vehicles represent to parking garages and marine vessels. In addition, there have also been updates to various standards in response to these increased fire hazards found in parking garages. \u0026nbsp;\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe 2022 edition of \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/13\" target=\"_blank\"\u003eNFPA 13, \u003cem\u003eStandard for the Installation of Sprinkler Systems\u003c/em\u003e\u003c/a\u003e, for example, has changed to increase the recommended hazard classification for parking structures from an Ordinary Hazard Group 1 to an Ordinary Hazard Group 2. The effect is a 33 percent increase in the design density, moving from 0.15 gpm/ft\u003csup\u003e2\u003c/sup\u003e to 0.2 gpm/ft\u003csup\u003e2\u003c/sup\u003e.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eAs of January of 2021, FM Global data sheets have also increased the hazard category for parking garages and car parks from a Hazard Category 2 to a Hazard Category 3.\u003c/p\u003e\n\u003cp style=\"margin: 0in 0in 8pt;\"\u003eNew to the 2023 edition of NFPA 88A, all parking garages are now required to have sprinkler systems installed in accordance with NFPA 13. Prior to this edition, sprinklers didn\u0026rsquo;t have to be installed in open parking structures.\u003c/p\u003e\n\u003cp\u003e\u003cspan\u003eWhile technology is constantly evolving, so are NFPA codes, standards, trainings, research, and other resources. The ever-growing presence of lithium-ion batteries in our day-to-day lives are changing the fire characteristics of our built environment. Fire protection professionals need to be able to stay on top of these changes to ensure the safety of people and property. For more information on the resources NFPA provides relates to electric vehicles, check out \u003ca rel=\"noopener noreferrer\" href=\"http://www.nfpa.org/EV\" target=\"_blank\"\u003enfpa.org/EV\u003c/a\u003e.\u003c/span\u003e\n\u003c/p\u003e"},"metaDescription":{"value":"How do EVs and other modern vehicles impact fire safety in parking garages"},"noFollow":{"value":false},"noIndex":{"value":false},"pageTitle":{"value":"EVs and Parking Garages | NFPA"},"addTitleSuffix":{"value":false},"RTL":{"value":false},"metaImage":{"value":{}},"CardImage":{"value":{"src":"https://content.nfpa.org/-/media/Project/Storefront/Catalog/Images/Blogs/BLS/parking-garage-hed.png?h=400\u0026iar=0\u0026w=800\u0026rev=7a6a56f3b5d6466ca3121884d958a664\u0026hash=A21C66BDB9EEE63265B80821127E4F21","width":"800","height":"400"}},"CardText":{"value":""},"CardButtonText":{"value":""},"Title Image":{"value":{"src":"https://content.nfpa.org/-/media/Project/Storefront/Catalog/Images/Blogs/BLS/parking-garage-hed.png?h=400\u0026iar=0\u0026w=800\u0026rev=7a6a56f3b5d6466ca3121884d958a664\u0026hash=A21C66BDB9EEE63265B80821127E4F21","width":"800","height":"400"}},"Taxonomies":[{"id":"b513a63a-7cba-43bc-986c-aeafc2aedc07","u
