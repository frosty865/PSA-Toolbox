        function inferStrategicRiskClass(vulnerability) {
            const text = `${vulnerability?.title || vulnerability?.issue || ''} ${vulnerability?.category || ''} ${vulnerability?.description || ''}`.toLowerCase();
            const source = String(vulnerability?.source_field || '').toLowerCase();
            if (text.includes('backup') || text.includes('runtime') || text.includes('utility') || text.includes('dependency') || source.includes('backup') || source.includes('dep-table')) {
                return 'Continuity';
            }
            if (text.includes('fire') || text.includes('sprinkler') || text.includes('standpipe') || text.includes('lifeguard') || text.includes('medical') || text.includes('evacuation')) {
                return 'Life Safety';
            }
            if (text.includes('ev ') || text.includes('lithium') || text.includes('charger') || text.includes('surveillance') || text.includes('access control') || text.includes('network') || text.includes('cyber')) {
                return 'Cyber-Physical';
            }
            if (text.includes('retail') || text.includes('public') || text.includes('vip') || text.includes('crowd') || text.includes('perimeter')) {
                return 'Public Access';
            }
            if (text.includes('responder') || text.includes('law enforcement') || text.includes('coordination') || source.includes('responder')) {
                return 'Interagency';
            }
            return 'Operational';
        }

        function classifySeverityFromEvidence(vulnerability) {
            const title = String(vulnerability?.title || vulnerability?.issue || '').toLowerCase();
            const category = String(vulnerability?.category || '').toLowerCase();
            const description = String(vulnerability?.description || vulnerability?.impact || vulnerability?.risk_impact || '').toLowerCase();
            const text = `${title} ${category} ${description}`;
            const triggerText = JSON.stringify(vulnerability?.trigger_conditions || {}).toLowerCase();
            const vectors = Array.isArray(vulnerability?.attack_vectors) ? vulnerability.attack_vectors.join(' ').toLowerCase() : '';
            const lifeSafetySignals = /(life-safety|evacuation|fire|sprinkler|standpipe|medical|panic|hostile|hostage|active shooter)/.test(text);
            const perimeterSignals = /(perimeter|fencing|vehicle barrier|bollard|standoff|public access|restricted access|unauthorized access)/.test(text);
            const continuitySignals = /(backup power|runtime|utility|dependency|generator|redundancy|single point of failure|outage)/.test(text);
            const cyberPhysicalSignals = /(surveillance|video|access control|network|cyber|system compromise|credential|electronic lock|alarm)/.test(text);
            const highConsequenceAbsence = /(no|not|missing|absent|unavailable|disabled|lacks?|lack of)\b/.test(text);
            const broadExposure = /(guest|public|site-wide|facility-wide|restricted|vip|crowd|multi-story)/.test(text);
            const manyVectors = (Array.isArray(vulnerability?.attack_vectors) ? vulnerability.attack_vectors.length : 0) >= 4 || vectors.includes('system compromise') || vectors.includes('unauthorized access');
            const incompleteTriggers = triggerText.includes('no') || triggerText.includes('missing') || triggerText.includes('false') || triggerText.includes('off');
            const immediateLifeThreat = /(fire|sprinkler|standpipe|evacuation|medical|panic|hostile|hostage|active shooter)/.test(text);
            const directEntryFailure = /(perimeter|fencing|vehicle barrier|bollard|standoff|restricted access|unauthorized access|entry control|guest access)/.test(text) && highConsequenceAbsence;
            const coreSafeguardFailure = /(backup power|single point of failure|system compromise|network|access control|surveillance|video|alarm)/.test(text) && highConsequenceAbsence && broadExposure;

            let severity = 'Low';
            const rationaleParts = [];

            if (lifeSafetySignals) {
                severity = 'High';
                rationaleParts.push('life-safety control absent or impaired');
                if (immediateLifeThreat) rationaleParts.push('evacuation or fire-response impact');
            } else if (perimeterSignals) {
                severity = 'High';
                rationaleParts.push('direct guest/public entry control issue');
                if (directEntryFailure) rationaleParts.push('uncontrolled approach or access path');
            } else if (continuitySignals) {
                severity = (highConsequenceAbsence && (broadExposure || manyVectors || incompleteTriggers)) ? 'High' : 'Medium';
                rationaleParts.push('critical service continuity issue');
                if (highConsequenceAbsence) rationaleParts.push('backup or restoration control absent or incomplete');
                if (broadExposure) rationaleParts.push('affects guest-facing operations');
            } else if (cyberPhysicalSignals) {
                severity = (highConsequenceAbsence && (broadExposure || manyVectors || incompleteTriggers)) ? 'High' : 'Medium';
                rationaleParts.push('security technology or electronic control issue');
                if (highConsequenceAbsence) rationaleParts.push('control absent or incomplete');
                if (manyVectors) rationaleParts.push('multiple observable failure paths');
            } else if (coreSafeguardFailure) {
                severity = 'High';
                rationaleParts.push('core safeguard failure');
                rationaleParts.push('broad guest-facing exposure');
            } else if (broadExposure || highConsequenceAbsence) {
                severity = 'Medium';
                rationaleParts.push('operational exposure');
                if (highConsequenceAbsence) rationaleParts.push('control absent or incomplete');
                if (broadExposure) rationaleParts.push('scope extends beyond a single isolated area');
            } else {
                severity = 'Low';
                rationaleParts.push('localized exposure with limited operational consequence');
            }

            return {
                severity,
                severity_rationale: rationaleParts.join('; ') || 'rubric-based classification'
            };
        }

        function attachQuestionTrace(vulnerability) {
            const v = { ...(vulnerability || {}) };
            const sourceMetaFor = (sourceField, sourceQuestion, existing = {}) => ({
                ...existing,
                ...(getSourceControlForField(sourceField) || {}),
                source_field: existing.source_field || sourceField || '',
                source_question: existing.source_question || sourceQuestion || ''
            });
            const withRiskClass = (obj) => {
                const severityAssessment = classifySeverityFromEvidence(obj);
                return {
                    ...obj,
                    severity: severityAssessment.severity,
                    severity_rationale: severityAssessment.severity_rationale,
                    risk_class: obj?.risk_class || inferStrategicRiskClass(obj),
                    trace_status: obj?.source_field && obj?.source_question ? 'direct' : 'derived'
                };
            };
            if (v.source_question && v.source_field) return withRiskClass(sourceMetaFor(v.source_field, v.source_question, v));
            if (v.source_field && !v.source_question) {
                return withRiskClass(sourceMetaFor(v.source_field, getQuestionContextForField(String(v.source_field).split('.').pop()), v));
            }
            if (v.source_question && !v.source_field) {
                return withRiskClass(sourceMetaFor('derived.question_trace', v.source_question, v));
            }
            
            if (v.field) {
                const fieldName = String(v.field);
                return withRiskClass(sourceMetaFor(`vip_planning.${fieldName}`, v.source_question || VIP_FIELD_QUESTION_MAP[fieldName] || `VIP question: ${fieldName}`, {
                    ...v,
                    source_field: v.source_field || `vip_planning.${fieldName}`,
                    source_question: v.source_question || VIP_FIELD_QUESTION_MAP[fieldName] || `VIP question: ${fieldName}`
                }));
            }
            
            const title = String(v.title || v.issue || '');
            const mapped = VULNERABILITY_QUESTION_MAP[title];
            if (mapped) {
                return withRiskClass(sourceMetaFor(mapped.source_field, mapped.source_question, { ...v, ...mapped }));
            }
            
            const categoryKey = String(v.category || '');
            const categoryFallback = CATEGORY_TRACE_FALLBACK[categoryKey];
            if (categoryFallback) {
                return withRiskClass(sourceMetaFor(categoryFallback.source_field, categoryFallback.source_question, { ...v, ...categoryFallback }));
            }
            
            if (v.vofc_id) {
                const vofcTrace = getVOFCTraceForId(v.vofc_id, null);
                return withRiskClass({
                    ...v,
                    source_field: v.source_field || vofcTrace?.source_field || `vofc.${v.vofc_id}`,
                    source_question: v.source_question || vofcTrace?.source_question || `Mapped VOFC control check for ${v.vofc_id}`,
                    ...(vofcTrace?.source_control ? { source_control: vofcTrace.source_control } : {}),
                    ...(vofcTrace?.source_family ? { source_family: vofcTrace.source_family } : {})
                });
            }
            
            return withRiskClass(v);
        }
        
        function vulnerabilityHasQuestionTrace(v) {
            return Boolean(v && (v.source_field || v.source_question || v.vofc_id || v.title || v.issue));
        }
        
        function analyzeVulnerabilities(data) {
            console.log('Starting enhanced vulnerability analysis with VOFC integration...');
            const flatAssessment = flattenSectionsForAnalysis(data);
            
            // Use VOFC matcher for automated analysis
            let vofcAnalysis = null;
            if (window.vofcMatcher) {
                try {
                    vofcAnalysis = window.vofcMatcher.analyzeAssessment(data);
                    console.log('VOFC analysis completed:', vofcAnalysis);
                } catch (error) {
                    console.error('VOFC analysis failed:', error);
                }
            }
            
            const vulnerabilities = [];
            /* Mitigations: V numbers and OFCs come from window.HOTEL_HAZARD_REGISTRY via window.vofcMatcher (createRegistryMatcher). */
            
            // Add VOFC vulnerabilities if available
            if (vofcAnalysis && vofcAnalysis.vulnerabilities) {
                console.log('Adding VOFC vulnerabilities:', vofcAnalysis.vulnerabilities.length);
                console.log('VOFC analysis result:', vofcAnalysis);
                vofcAnalysis.vulnerabilities.forEach((vofcVuln, index) => {
                    console.log(`Vulnerability ${index}:`, vofcVuln);
                    
                    // Get vulnerability ID - handle all possible property names
                    // VOFC engine returns { id: 'V003', ... } where id is the v_number
                    const vulnerabilityId = vofcVuln.id || vofcVuln.v_number || vofcVuln.vofc_id || null;
                    
                    if (!vulnerabilityId) {
                        console.warn(`Vulnerability ${index} has no ID, skipping:`, vofcVuln);
                        return; // Skip vulnerabilities without IDs
                    }
                    
                    // Look up full vulnerability data from VOFC system
                    let vulnData = null;
                    let options = [];
                    
                    if (window.vofcMatcher && typeof window.vofcMatcher.getVulnerabilityById === 'function') {
                        vulnData = window.vofcMatcher.getVulnerabilityById(vulnerabilityId);
                        console.log(`Looking up vulnerability ${vulnerabilityId}:`, vulnData ? 'Found' : 'Not found');
                    }
                    
                    if (window.vofcMatcher && typeof window.vofcMatcher.getOptionsForVulnerability === 'function') {
                        const rawOptions = window.vofcMatcher.getOptionsForVulnerability(vulnerabilityId);
                        // Extract option text if options are objects, otherwise use as-is
                        options = rawOptions.map(opt => {
                            if (typeof opt === 'string') return opt;
                            if (opt.option_text) return opt.option_text;
                            if (opt.text) return opt.text;
                            return String(opt);
                        });
                        console.log(`Options for ${vulnerabilityId}:`, options.length, 'options found');
                    }
                    
                    // Use the vulnerability data directly if available, otherwise use the analysis result
                    const finalVulnerabilityId = vulnData ? (vulnData.v_number || vulnData.id) : vulnerabilityId;
                    const title = vulnData ? vulnData.vulnerability_text : (vofcVuln.title || vofcVuln.vulnerability_text || 'Security Vulnerability');
                    const description = vulnData ? (vulnData.description || vulnData.vulnerability_text) : (vofcVuln.description || vofcVuln.title || 'Security vulnerability detected in assessment');
                    const impact = vulnData
                        ? vulnData.risk_impact
                        : (vofcVuln.impact || vofcVuln.risk_impact || vofcVuln.description || 'The finding indicates a specific security control gap with operational consequences.');
                    const severity = vulnData ? vulnData.severity : (vofcVuln.severity || 'Medium');
                    const category = vulnData ? vulnData.category : (vofcVuln.category || 'Security');
                    const alignmentGap = vulnData ? vulnData.compliance_gap : (vofcVuln.compliance_gap || 'Security requirements');
                    const attackVectors = vulnData ? vulnData.attack_vectors : (vofcVuln.attack_vectors || []);
                    const standardsRef = vulnData ? vulnData.standards_reference : (vofcVuln.standards_reference || 'Security standards');
                    const sourceCitations = Array.isArray(vulnData?.source_citations) && vulnData.source_citations.length > 0
                        ? vulnData.source_citations
                        : (Array.isArray(vulnData?.source_references) && vulnData.source_references.length > 0
                            ? vulnData.source_references.map(ref => ({ label: ref, url: '' }))
                            : (Array.isArray(vofcVuln.source_citations) && vofcVuln.source_citations.length > 0
                                ? vofcVuln.source_citations
                                : (Array.isArray(vofcVuln.source_references) && vofcVuln.source_references.length > 0
                                    ? vofcVuln.source_references.map(ref => ({ label: ref, url: '' }))
                                    : [])));
                    const vofcTrace = getVOFCTraceForId(finalVulnerabilityId, flatAssessment);
                    const matchedQuestions = Array.isArray(vofcVuln.matchedQuestions) ? vofcVuln.matchedQuestions : [];
                    const primaryMatchedQuestion = matchedQuestions.length > 0 ? matchedQuestions[0] : null;
                    const matchedField = primaryMatchedQuestion?.question || '';
                    const matchedContext = primaryMatchedQuestion?.context || (matchedField ? getQuestionContextForField(matchedField) : '');
                    
                    vulnerabilities.push({
                        vofc_id: finalVulnerabilityId,
                        title: title,
                        description: description,
                        impact: impact,
                        severity: severity,
                        category: category,
                        compliance_gap: alignmentGap,
                        attack_vectors: attackVectors,
                        standards_reference: standardsRef,
                        recommendations: options.length > 0 ? options : [],
                        options: Array.isArray(vulnData?.options) ? vulnData.options : (Array.isArray(vofcVuln.options) ? vofcVuln.options : []),
                        source_field: vofcTrace?.source_field || matchedField || '',
                        source_question: vofcTrace?.source_question || matchedContext || '',
                        source_citations: sourceCitations,
                        source_references: sourceCitations.map(c => c.label || c.url || '').filter(Boolean)
                    });
                });
            }
            
            console.log('Enhanced vulnerability analysis complete:', vulnerabilities.length, 'total vulnerabilities');
            return vulnerabilities;
        }
        
        /**
         * Options for consideration in reports: OFC rows from HOTEL_HAZARD_REGISTRY (option_text + reference).
         * HOST does not invent generic mitigations when the registry or matcher returns none.
         */
        function normalizeOptionsForConsideration(vuln) {
            const raw = Array.isArray(vuln?.recommendations)
                ? vuln.recommendations
                : Array.isArray(vuln?.options)
                    ? vuln.options
                    : (vuln?.recommendation ? [vuln.recommendation] : []);
            return raw
                .map(item => {
                    if (item && typeof item === 'object') {
                        return String(item.description || item.option_text || item.title || '').trim();
                    }
                    return String(item ?? '').trim();
                })
                .filter(item => item && item.toLowerCase() !== 'undefined' && item.toLowerCase() !== 'null');
        }

        function normalizeOptionsForConsiderationDetailed(vuln) {
            const raw = Array.isArray(vuln?.recommendations)
                ? vuln.recommendations
                : Array.isArray(vuln?.options)
                    ? vuln.options
                    : (vuln?.recommendation ? [vuln.recommendation] : []);
            return raw
                .map(item => {
                    if (item && typeof item === 'object') {
                        return {
                            text: String(item.description || item.option_text || item.title || '').trim(),
                            reference: String(item.reference || item.source_reference || item.source || item.citation || '').trim()
                        };
                    }
                    return {
                        text: String(item ?? '').trim(),
                        reference: ''
                    };
                })
                .filter(item => item.text && item.text.toLowerCase() !== 'undefined' && item.text.toLowerCase() !== 'null')
                .filter(item => !hasRegulatoryOptionLanguage(item.text));
        }

        function hasRegulatoryOptionLanguage(text) {
            const value = String(text || '').toLowerCase();
            return /\b(shall|must|required|requirement|required by|in accordance with|compliance|code|regulation|regulatory)\b/.test(value);
        }

        const HOST_APP_VERSION = '3.0.0';

        function primaryConsiderationActionText(vuln) {

        function getFirstSentence(text) {
            const value = String(text || '').trim().replace(/\s+/g, ' ');
            if (!value) return 'No impact statement available.';
            const match = value.match(/^(.*?[.!?])(?:\s|$)/);
            return match ? match[1] : value;
        }

        function summarizeFindingConsequence(vuln) {
            const raw = String(vuln?.risk_impact || vuln?.impact || vuln?.businessImpact || vuln?.description || '').trim();
            if (!raw) return '';

        }

        function normalizeVulnerabilityText(text) {
            return String(text || '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getExactVulnerabilityText(vuln) {
            return normalizeVulnerabilityText(
                vuln?.vulnerability_text ||

                vuln?.issue ||
                'Security vulnerability'
            );
        }

        function normalizeComparisonText(text) {
            return String(text || '')
                .toLowerCase()
                .replace(/\s+/g, ' ')
                .replace(/[^\w\s]+/g, '')
                .trim();
        }

        function isRedundantVulnerabilityDescription(title, description) {
            const t = normalizeComparisonText(title);
            const d = normalizeComparisonText(description);
            if (!t || !d) return false;
            if (t === d) return true;
            if (d.startsWith(t)) {
                const remainder = d.slice(t.length).trim();
                return remainder.length > 0 && remainder.length < 25;
            }
            return false;
        }

        function buildVulnerabilityContext(vuln) {
            const parts = [];
            const area = String(vuln?.source_control || vuln?.section || vuln?.category || '').trim();
            const family = String(vuln?.source_family || '').trim();
            const field = String(vuln?.field || '').trim();
            const value = String(vuln?.value || '').trim();
            const expected = String(vuln?.expected || '').trim();
            if (area) parts.push(area);
            if (family && family !== area) parts.push(family);
            if (field) parts.push(`Field: ${field}`);
            if (value) parts.push(`Observed: ${value}`);
            if (expected) parts.push(`Expected: ${expected}`);
            return parts.join(' · ');
        }

        function buildTriggerSummary(vuln) {
            const triggers = vuln && typeof vuln.trigger_conditions === 'object' && vuln.trigger_conditions ? vuln.trigger_conditions : null;
            if (!triggers) return '';
            const entries = Object.entries(triggers);
            if (!entries.length) return '';
            const parts = entries.map(([fieldName, expected]) => `${getQuestionContextForField(fieldName)} ${formatTriggerExpectation(expected)}`);
            return parts.join(' · ');
        }

        function isVagueRegistryTitle(title) {
            const value = normalizeComparisonText(title);

                'lacking',
                'does not',
                'gap',
                'missing',
                'absent',
                'not clearly',
                'not fully confirmed',
                'not fully defined'
            ].some(fragment => value.includes(fragment));

        function buildCanonicalVulnerabilityRecord(vuln) {

            const exactTitle = getExactVulnerabilityText(vuln);
            const triggerSummary = buildTriggerSummary(vuln);
            const displayTitle = !isVagueRegistryTitle(exactTitle) ? exactTitle : (triggerSummary || exactTitle);
            const description = String(

                vuln?.vulnerability_text ||

        function getDisplayVulnerabilityTitle(vuln) {

        function getImpactCitationSource(vuln) {

        function renderCitationLinks(vuln) {

        function renderSourceControlMatrix(vulnerabilities) {
            const items = Array.isArray(vulnerabilities) ? vulnerabilities : [];
            const lanePriority = (value) => {
                const text = String(value || '').toLowerCase();
                if (/vip movement|guest services and valet coordination/.test(text)) return 0;
                if (/perimeter and vehicle access/.test(text)) return 1;
                if (/guest-area access control|physical access control and visitor management/.test(text)) return 2;
                if (/surveillance and monitoring|system redundancy and backup power|technology and system resilience/.test(text)) return 3;
                if (/response and incident management|business continuity and recovery|emergency response and incident management/.test(text)) return 4;
                if (/vendor and contractor screening|service area separation and supervision|back-of-house|vendor/.test(text)) return 5;
                if (/security training and exercise readiness|personnel security and oversight/.test(text)) return 6;

            const rows = items.map(vuln => `

        function getHostReportTitleFallback() {

        /** Normalize title for deduplication (executive views). */
        function normalizeVulnerabilityTitleKey(title) {

                .trim()
                .replace(/\s+/g, ' ');

        /**
         * Executive list: severity-first, then drop near-duplicate titles (substring overlap)
         * so the report reads like a priority memo, not a raw dump.
         */
        function selectExecutivePriorityVulnerabilities(vulnerabilities, maxItems = 12) {
            const severityOrder = { critical: 5, significant: 4, high: 3, medium: 2, low: 1 };
            const list = [...(vulnerabilities || [])].sort((a, b) => {
                const sa = severityOrder[String(a.severity || '').toLowerCase()] || 0;
                const sb = severityOrder[String(b.severity || '').toLowerCase()] || 0;
                return sb - sa;
            });
            const selected = [];
            function isNearDuplicate(newV) {
                const n = normalizeVulnerabilityTitleKey(newV.title);
                if (!n) return true;
                for (const ex of selected) {
                    const e = normalizeVulnerabilityTitleKey(ex.title);
                    if (n === e) return true;
                    if (n.length >= 24 && e.length >= 24 && (n.includes(e) || e.includes(n))) return true;
                }
                return false;
            }
            for (const v of list) {
                if (selected.length >= maxItems) break;
                if (isNearDuplicate(v)) continue;
                selected.push(v);
            }
            return selected;

                return `<li>${escapeHtmlForReport(opt.text)}${sourceLine}</li>`;
            }).join('')}</ul>`;

        function mapLegacyVulnerability(v) {
            if (!v) return null;
            const hasTitleSource = Boolean(v?.vulnerability_text || v?.title || v?.issue || v?.description);
            const hasReferences = Array.isArray(v?.source_citations) ? v.source_citations.length > 0 : Array.isArray(v?.source_references) && v.source_references.length > 0;
            if (!hasTitleSource || !hasReferences) return null;
            const exactTitle = String(v.vulnerability_text || v.title || v.issue || v.description).replace(/\s+/g, ' ').trim();
            return attachQuestionTrace({
                title: exactTitle,
                description: v.description || v.vulnerability_text || v.issue || '',
                impact: formatImpactWithCitation(v) || '',
                severity: v.severity || 'Medium',
                category: v.category || v.sheet || 'Security',
                recommendations: normalizeOptionsForConsideration(v),
                options: Array.isArray(v.options) ? v.options : [],
                source_field: v.source_field || '',
                source_question: v.source_question || '',
                vofc_id: v.vofc_id || v.v_number || '',
                id: v.id || v.v_number || '',
                source_citations: v.source_citations || (Array.isArray(v.source_references) ? v.source_references.map(ref => ({ label: ref, url: '' })) : [])
            });
        }

        function getSeverityRank(severityValue) {
            const severity = String(severityValue || '').toLowerCase();
            if (severity === 'critical' || severity === 'significant') return 4;
            if (severity === 'high') return 3;
            if (severity === 'medium') return 2;
            if (severity === 'low') return 1;
            return 0;
        }

        function getTopPriorityFindings(vulnerabilities, limit = 5) {
            const items = Array.isArray(vulnerabilities) ? [...vulnerabilities] : [];
            return items
                .sort((a, b) => {
                    const sevDelta = getSeverityRank(b.severity) - getSeverityRank(a.severity);
                    if (sevDelta !== 0) return sevDelta;
                    return String(a.title || '').localeCompare(String(b.title || ''));
                })
                .slice(0, limit);
        }

        function buildMergedVulnerabilitySet(assessmentData) {
            const flatAssessment = flattenSectionsForAnalysis(assessmentData);
            const registryAnalysis = window.vofcMatcher && typeof window.vofcMatcher.analyzeAssessment === 'function'
                ? window.vofcMatcher.analyzeAssessment(assessmentData)
                : { vulnerabilities: [] };
            const registryVulnerabilities = Array.isArray(registryAnalysis.vulnerabilities) ? registryAnalysis.vulnerabilities : [];
            const tracedVulnerabilities = registryVulnerabilities.map(attachQuestionTrace).filter(Boolean);
            const mergedById = new Map();
            tracedVulnerabilities.forEach(v => {
                const key = String(v.id || v.vofc_id || v.title || v.issue || '').trim().toLowerCase();
                if (!key) return;
                if (!mergedById.has(key)) {
                    mergedById.set(key, v);
                } else {
                    const existing = mergedById.get(key);
                    if (existing && !existing.source_question && v.source_question) {
                        mergedById.set(key, { ...existing, source_question: v.source_question, trace_status: v.trace_status || existing.trace_status || 'derived' });
                    }
                }
            });
            return Array.from(mergedById.values()).filter(Boolean);
        }

        /** Resolve CSS path against the page URL so print iframe/popup (about:blank) still load Assets/css/*. */

        /** Resolve Assets/* paths for print iframe and popup (relative URLs break with about:blank). */

        /** Rewrite src/href pointing at Assets/ to absolute URLs so images load in print iframe. */
        function absolutizeReportHtmlAssetUrls(html) {
            const base = window.location.href;
            return String(html || '').replace(
                /\b(src|href)=(["'])(Assets\/[^"']+)\2/gi,
                (match, attr, quote, path) => {

                    } catch (e) {
                        return match;
                    }
                }

        /**
         * Railway-hosted Python report-service (_report-service-edit): POST /render with JSON { generic_report } → DOCX bytes.
         * Configure (first match wins):
         *   - window.HOST_REPORT_RENDER_URL — full URL ending in /render
         *   - window.HOST_REPORT_SERVICE_URL or HOST_RAILWAY_REPORT_URL — base URL (/render appended)
         *   - <meta name="host-report-render-url" content="…"> or <meta name="host-report-service-url" content="…">
         *   - localStorage key HOST_REPORT_SERVICE_URL — base or full /render (dev override without editing HTML)
         * Legacy: HOST_REMOTE_REPORT_URL, meta host-remote-report-url.
         */
        function getHostReportRenderUrl() {
            const t = (s) => (typeof s === 'string' ? s.trim() : '');
            const noTrailSlash = (u) => u.replace(/\/+$/, '');
            const withRender = (base) => {
                const b = noTrailSlash(base);
                return /\/render$/i.test(b) ? b : `${b}/render`;
            };

            const explicit = t(typeof window.HOST_REPORT_RENDER_URL !== 'undefined' ? window.HOST_REPORT_RENDER_URL : '');
            if (explicit) {
                return withRender(explicit);
            }
            const metaFull = document.querySelector('meta[name="host-report-render-url"]');
            if (metaFull && t(metaFull.getAttribute('content'))) {
                return withRender(t(metaFull.getAttribute('content')));
            }

            const base =
                t(window.HOST_REPORT_SERVICE_URL) ||
                t(window.HOST_RAILWAY_REPORT_URL) ||
                (() => {
                    const m = document.querySelector('meta[name="host-report-service-url"]');
                    return m ? t(m.getAttribute('content')) : '';
                })();
            if (base) {
                return withRender(base);
            }

            const legacy = t(window.HOST_REMOTE_REPORT_URL);
            if (legacy) {
                return withRender(legacy);
            }
            const metaLegacy = document.querySelector('meta[name="host-remote-report-url"]');
            if (metaLegacy && t(metaLegacy.getAttribute('content'))) {
                return withRender(t(metaLegacy.getAttribute('content')));
            }
            try {
                const ls = t(typeof localStorage !== 'undefined' ? localStorage.getItem('HOST_REPORT_SERVICE_URL') : '');
                if (ls) {
                    return withRender(ls);
                }
            } catch (e) {
                /* ignore */
            }
            return '';
        }

        function sanitizeHostDocxFilenamePart(s) {
            return String(s || 'report')
                .replace(/[<>:"/\\|?*\u0000-\u001f]/g, '_')
                .replace(/\s+/g, '_')
                .slice(0, 80);
        }

        function tableElementToPlainLines(table) {
            const rows = [];
            table.querySelectorAll('tr').forEach((tr) => {
                const cells = Array.from(tr.querySelectorAll('th, td')).map((c) =>
                    String(c.textContent || '').replace(/\s+/g, ' ').trim()
                );
                if (cells.some(Boolean)) {
                    rows.push(cells.join(' — '));
                }
            });
            return rows.join('\n');
        }

        /**
         * Map current report HTML into generic_report.sections for remote DOCX (python _render_generic_report).
         * Handles comprehensive (.report-section) and legacy layouts (h2 chunks).
         */
        function hostReportHtmlToGenericSections(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(String(html || ''), 'text/html');
            doc.querySelectorAll('.report-utility-bar, script, style').forEach((el) => el.remove());

            const pushBlocks = (elements) => {
                const out = [];
                elements.forEach((sec) => {
                    const h2 = sec.querySelector(':scope > h2') || sec.querySelector('h2');
                    let heading = h2
                        ? String(h2.textContent || '').replace(/\s+/g, ' ').trim()
                        : (sec.id || '').replace(/-/g, ' ') || 'Section';
                    const paragraphs = [];
                    const bullets = [];
                    sec.querySelectorAll('p').forEach((p) => {
                        const t = String(p.textContent || '').replace(/\s+/g, ' ').trim();
                        if (t) {
                            paragraphs.push(t);
                        }
                    });
                    sec.querySelectorAll('table').forEach((tb) => {
                        const lines = tableElementToPlainLines(tb);
                        if (lines) {
                            paragraphs.push(lines);
                        }
                    });
                    sec.querySelectorAll('ul li, ol li').forEach((li) => {
                        const t = String(li.textContent || '').replace(/\s+/g, ' ').trim();
                        if (t) {
                            bullets.push(t);
                        }
                    });
                    sec.querySelectorAll('h3, h4').forEach((h) => {
                        const t = String(h.textContent || '').replace(/\s+/g, ' ').trim();
                        if (t) {
                            paragraphs.push(t);
                        }
                    });
                    if (heading || paragraphs.length || bullets.length) {
                        out.push({ heading: heading || 'Section', paragraphs, bullets });
                    }
                });
                return out;
            };

            const byClass = doc.querySelectorAll('.report-section');
            if (byClass.length > 0) {
                return pushBlocks(Array.from(byClass));
            }

            const bySectionDiv = doc.querySelectorAll('.detailed-report .section');
            if (bySectionDiv.length > 0) {
                return pushBlocks(Array.from(bySectionDiv));
            }

            const sections = [];
            const root = doc.querySelector('.detailed-report, .executive-summary, .report-container') || doc.body;
            const h2s = root.querySelectorAll('h2');
            h2s.forEach((h2) => {
                if (h2.closest('.report-header')) {
                    return;
                }
                const heading = String(h2.textContent || '').replace(/\s+/g, ' ').trim();
                const paragraphs = [];
                const bullets = [];
                let el = h2.nextElementSibling;
                while (el && el.tagName !== 'H2') {
                    if (el.tagName === 'P') {
                        const t = String(el.textContent || '').replace(/\s+/g, ' ').trim();
                        if (t) {
                            paragraphs.push(t);
                        }
                    } else if (el.tagName === 'TABLE') {
                        const lines = tableElementToPlainLines(el);
                        if (lines) {
                            paragraphs.push(lines);
                        }
                    } else if (el.tagName === 'UL' || el.tagName === 'OL') {
                        el.querySelectorAll(':scope > li').forEach((li) => {
                            const t = String(li.textContent || '').replace(/\s+/g, ' ').trim();
                            if (t) {
                                bullets.push(t);
                            }
                        });
                    } else {
                        el.querySelectorAll('p').forEach((p) => {
                            const t = String(p.textContent || '').replace(/\s+/g, ' ').trim();
                            if (t) {
                                paragraphs.push(t);
                            }
                        });
                        el.querySelectorAll('table').forEach((tb) => {
                            const lines = tableElementToPlainLines(tb);
                            if (lines) {
                                paragraphs.push(lines);
                            }
                        });
                        el.querySelectorAll('ul li, ol li').forEach((li) => {
                            const t = String(li.textContent || '').replace(/\s+/g, ' ').trim();
                            if (t) {
                                bullets.push(t);
                            }
                        });
                    }
                    el = el.nextElementSibling;
                }
                if (heading) {
                    sections.push({ heading, paragraphs, bullets });
                }
            });
            if (sections.length > 0) {
                return sections;
            }
            const plain = String(root.textContent || '').replace(/\s+/g, ' ').trim();
            if (plain) {
                return [{ heading: 'Report', paragraphs: [plain], bullets: [] }];
            }
            return [];
        }

        function buildHostRemoteGenericReportPayload(reportHTML, reportTitle) {
            const ctx = getReportPrintContext(reportTitle);
            const sections = hostReportHtmlToGenericSections(reportHTML);
            return {
                template_key: 'host',
                title: ctx.title,
                subtitle: HOST_REPORT_COPY.reportSubtitle,
                header_left: ctx.facility,
                header_right: ctx.assessmentDate,
                footer_left: HOST_REPORT_COPY.printFooterTagline,
                footer_right: HOST_REPORT_COPY.copyrightLine,
                methodology: HOST_REPORT_COPY.methodologyAttribution,
                note: HOST_REPORT_COPY.shortDisclaimer,
                version: HOST_APP_VERSION,
                date: ctx.assessmentDate,
                facility: ctx.facility,
                assessor: ctx.assessor,
                publisher: HOST_REPORT_COPY.publisherLine,
                sections
            };
        }

        async function fetchRemoteHostDocx(reportHTML, reportTitle) {
            const endpoint = getHostReportRenderUrl();
            if (!endpoint) {
                return { ok: false, reason: 'no_url' };
            }
            const generic_report = buildHostRemoteGenericReportPayload(reportHTML, reportTitle);
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ generic_report }),
                signal: AbortSignal.timeout(120000)
            });
            const ct = (res.headers.get('content-type') || '').toLowerCase();
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(errText || `Remote report HTTP ${res.status}`);
            }
            if (ct.includes('json')) {
                const errText = await res.text();
                throw new Error(errText || 'Remote report returned an error.');
            }
            if (
                !ct.includes('wordprocessingml') &&
                !ct.includes('octet-stream') &&
                !ct.includes('application/zip')
            ) {
                const maybe = await res.text();
                throw new Error(maybe || 'Remote report did not return a DOCX file.');
            }
            const blob = await res.blob();
            const filename = `HOST_${sanitizeHostDocxFilenamePart(generic_report.facility)}_${sanitizeHostDocxFilenamePart(generic_report.date)}.docx`;
            return { ok: true, blob, filename };
        }

        function triggerHostDocxDownload(blob, filename) {
            const url = URL.createObjectURL(blob);

            a.href = url;

                return Promise.resolve();
            }
            const existing = document.querySelector('script[data-host-mammoth="1"]');
            if (existing) {
                return new Promise((resolve) => {
                    if (window.mammoth && window.mammoth.convertToHtml) {
                        resolve();
                        return;
                    }
                    existing.addEventListener('load', () => resolve());
                    existing.addEventListener('error', () => resolve());
                });
            }
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = getHostAssetUrl('Assets/js/mammoth.browser.min.js');
                s.async = true;
                s.setAttribute('data-host-mammoth', '1');

            });

        function formatPrintValidationMessage(results) {
            const maxLines = 12;
            const lines = (results.errors || []).slice(0, maxLines).map((e) => e.message);
            const more = (results.errors || []).length - maxLines;
            let body = 'The assessment must be complete before printing.\n\n' + lines.join('\n');
            if (more > 0) {
                body += `\n\n… and ${more} more issue(s).`;
            }
            body += `\n\nCompleteness: ${results.completeness}%.`;
            return body;
        }

        async function printCurrentReport() {
            const readiness = validateAssessmentData(collectAllFormData());
            if (!readiness.valid) {
                alert(formatPrintValidationMessage(readiness));
                return;
            }
            const cachedReportHTML = typeof window.__lastGeneratedReportHTML === 'string'
                ? window.__lastGeneratedReportHTML
                : '';
            const cachedReportTitle = typeof window.__lastGeneratedReportTitle === 'string'
                ? window.__lastGeneratedReportTitle
                : getHostReportTitleFallback();
            const reportContainer = getActiveReportContainer();
            const containerHTML = reportContainer ? String(reportContainer.innerHTML || '').trim() : '';
            const reportHTMLToPrint = cachedReportHTML.trim() !== '' ? cachedReportHTML : containerHTML;
            if (reportHTMLToPrint.trim() === '') {
                alert('No report content available to print.');
                return;
            }

            if (getHostReportRenderUrl()) {
                try {
                    const remote = await fetchRemoteHostDocx(reportHTMLToPrint, cachedReportTitle);
                    if (remote && remote.ok && remote.blob && remote.filename) {
                        triggerHostDocxDownload(remote.blob, remote.filename);
                        alert(
                            'A Word report (.docx) was generated by the report service. Open it in Microsoft Word (or compatible software) and use File → Print to send to your printer.'
                        );
                        return;
                    }
                } catch (remoteErr) {
                    console.warn(
                        'HOST: Report-service DOCX failed (check HOST_REPORT_SERVICE_URL, CORS, and that POST /render is available). Using browser print.',
                        remoteErr
                    );
                }
            } else {
                console.info(
                    'HOST: No DOCX service URL — Print uses the browser. For Railway (no local Python): set NEXT_PUBLIC_HOST_REPORT_SERVICE_URL in Vercel to your Railway service base URL and rebuild (host-report-env.js). Or meta host-report-service-url / localStorage HOST_REPORT_SERVICE_URL.'
                );
            }

            let printableHTML;
            try {
                printableHTML = await buildPrintableReportDocument(reportHTMLToPrint, cachedReportTitle);
            } catch (printBuildError) {
                console.error('Print document build failed:', printBuildError);
                alert('Unable to prepare print view. Please try again.');
                return;
            }

            // Preferred path: hidden iframe print (works when popups are blocked).
            const iframe = document.createElement('iframe');
            iframe.style.position = 'fixed';
            iframe.style.right = '0';
            iframe.style.bottom = '0';
            iframe.style.width = '0';
            iframe.style.height = '0';
            iframe.style.border = '0';
            iframe.setAttribute('aria-hidden', 'true');
            document.body.appendChild(iframe);

            const cleanupIframe = () => {
                setTimeout(() => {
                    if (iframe && iframe.parentNode) {
                        iframe.parentNode.removeChild(iframe);
                    }
                }, 800);
            };

            try {
                const frameDoc = iframe.contentWindow?.document || iframe.contentDocument;
                if (!frameDoc) {
                    throw new Error('Iframe document unavailable');
                }
                frameDoc.open();
                frameDoc.write(printableHTML);
                frameDoc.close();

                setTimeout(() => {
                    try {
                        iframe.contentWindow.focus();
                        iframe.contentWindow.print();
                        cleanupIframe();
                    } catch (framePrintError) {
                        console.error('Iframe print failed:', framePrintError);
                        cleanupIframe();
                        // Secondary path: popup print if iframe print is blocked.
                        const printWindow = window.open('', '_blank', 'noopener,noreferrer,width=1100,height=800');
                        if (printWindow) {
                            printWindow.document.open();
                            printWindow.document.write(printableHTML);
                            printWindow.document.close();
                            printWindow.focus();
                            setTimeout(() => {
                                try {
                                    printWindow.print();
                                } catch (popupPrintError) {
                                    console.error('Popup print failed:', popupPrintError);
                                    alert('Printing failed in this browser.');
                                }
                            }, 150);
                        } else {
                            alert('Printing blocked by browser settings. Please allow popups/print for this page and try again.');
                        }
                    }
                }, 150);
            } catch (error) {
                console.error('Print preparation failed:', error);
                cleanupIframe();
                alert('Unable to prepare print view. Please regenerate the report and try again.');
            }
        }

        // Dynamic Vulnerability Analysis System
        class DynamicVulnerabilityAnalyzer {
            constructor() {
                this.currentVulnerabilities = [];
                this.currentenhancementOpportunities = [];
                this.analysisHistory = [];
                this.isAnalyzing = false;
            }

            // Analyze a single field change in real-time
            analyzeFieldChange(fieldName, fieldValue, fieldType = 'select') {
                if (this.isAnalyzing) return;
                this.isAnalyzing = true;
                try {
                    // Per-field hosting-guideline mappings were removed; full analysis runs via Run Analysis / VOFC.
                } catch (error) {
                    console.error('Error in dynamic vulnerability analysis:', error);
                } finally {
                    this.isAnalyzing = false;
                }
            }

            // Check if a field value considers a vulnerability
            checkVulnerabilityCondition(value, mapping) {
                if (!mapping || !mapping.vulnerability_if) return false;

                const vulnerabilityCondition = mapping.vulnerability_if;
                
                // Handle different condition types
                if (vulnerabilityCondition.includes('<') && !isNaN(value)) {
                    const threshold = parseFloat(vulnerabilityCondition.replace(/[^\d.]/g, ''));
                    return parseFloat(value) < threshold;
                }
                
                if (vulnerabilityCondition.includes('>') && !isNaN(value)) {
                    const threshold = parseFloat(vulnerabilityCondition.replace(/[^\d.]/g, ''));
                    return parseFloat(value) > threshold;
                }
                
                if (vulnerabilityCondition.includes('===') || vulnerabilityCondition.includes('==')) {
                    const expectedValue = vulnerabilityCondition.replace(/[=]/g, '').trim();
                    return value === expectedValue;
                }
                
                // Direct string matching
                return value === vulnerabilityCondition;
            }

            // consider vulnerability to current list
            considerVulnerability(fieldName, fieldValue, mapping) {
                const existingIndex = this.currentVulnerabilities.findIndex(v => v.field === fieldName);
                
                const vulnerability = {
                    field: fieldName,
                    value: fieldValue,
                    severity: mapping.severity,
                    category: mapping.category,
                    intent: mapping.intent,
                    expected: mapping.expected,
                    profile_significant: mapping.profile_significant,
                    timestamp: new Date().toISOString()
                };

                if (existingIndex >= 0) {
                    this.currentVulnerabilities[existingIndex] = vulnerability;
                } else {
                    this.currentVulnerabilities.push(vulnerability);
                }
            }

            // Remove vulnerability from current list
            removeVulnerability(fieldName) {
                this.currentVulnerabilities = this.currentVulnerabilities.filter(v => v.field !== fieldName);
            }

            // Update visual indicator for a field
            updateVulnerabilityIndicator(fieldName, isVulnerability, mapping) {
                const fieldElement = document.getElementById(fieldName);
                if (!fieldElement) return;

                // Remove existing indicators
                fieldElement.classList.remove('vulnerability-indicator', 'consideration-indicator');
                
                // consider new indicator
                if (isVulnerability) {
                    fieldElement.classList.add('vulnerability-indicator');
                    fieldElement.title = `Vulnerability: ${mapping.intent}`;
                } else {
                    fieldElement.classList.add('consideration-indicator');
                    fieldElement.title = `consideration: Meets ${mapping.standard} standards`;
                }
            }

            // Update progress indicator
            updateProgressIndicator() {
                const totalFields = document.querySelectorAll('input, select, textarea').length;
                const vulnerableFields = this.currentVulnerabilities.length;
                const securityScore = Math.max(0, 100 - (vulnerableFields * 2));
                
                // Update progress bar
                const progressFill = document.getElementById('progress_fill');
                if (progressFill) {
                    progressFill.style.width = `${securityScore}%`;
                    progressFill.setAttribute('data-score', securityScore);
                }

                // Update vulnerability counter
                const vulnerabilityCounter = document.getElementById('vulnerability_counter');
                if (vulnerabilityCounter) {
                    vulnerabilityCounter.textContent = vulnerableFields;
                    vulnerabilityCounter.className = vulnerableFields > 0 ? 'vulnerability-count' : 'consideration-count';
                }

                // Update security posture score
                const securityScoreElement = document.getElementById('security_score');
                if (securityScoreElement) {
                    securityScoreElement.textContent = securityScore;
                    securityScoreElement.className = this.getScoreClass(securityScore);
                }
            }

            // Get CSS class for score
            getScoreClass(score) {
                return getScoreClass(score);
            }

            // Get current analysis summary
            getAnalysisSummary() {
                const highSeverity = this.currentVulnerabilities.filter(v => v.severity === 'High').length;
                const mediumSeverity = this.currentVulnerabilities.filter(v => v.severity === 'Medium').length;
                const lowSeverity = this.currentVulnerabilities.filter(v => v.severity === 'Low').length;
                const profileSignificant = this.currentVulnerabilities.filter(v => v.profile_significant).length;

                return {
                    total: this.currentVulnerabilities.length,
                    high: highSeverity,
                    medium: mediumSeverity,
                    low: lowSeverity,
                    profile_significant: profileSignificant,
                    security_score: Math.max(0, 100 - (this.currentVulnerabilities.length * 2))
                };
            }

            // Clear all vulnerabilities
            clearAnalysis() {
                this.currentVulnerabilities = [];
                this.currentenhancementOpportunities = [];
                
                // Remove all indicators
                document.querySelectorAll('.vulnerability-indicator, .consideration-indicator').forEach(el => {
                    el.classList.remove('vulnerability-indicator', 'consideration-indicator');
                    el.title = '';
                });
                
                this.updateProgressIndicator();
            }
        }

        // Global instance
        const dynamicAnalyzer = new DynamicVulnerabilityAnalyzer();

        // Initialize dynamic vulnerability analysis
        function initializeDynamicVulnerabilityAnalysis() {
            // consider event listeners to all form fields
            document.querySelectorAll('input, select, textarea').forEach(field => {
                if (field.id && field.name) {
                    // Remove existing listeners to avoid duplicates
                    field.removeEventListener('change', handleFieldChange);
                    field.removeEventListener('input', handleFieldChange);
                    
                    // Add new listeners
                    field.addEventListener('change', handleFieldChange);
                    field.addEventListener('input', handleFieldChange);
                }
            });
        }

        // Handle field changes
        function handleFieldChange(event) {
            const field = event.target;
            const fieldName = field.name || field.id;
            const fieldValue = field.value;
            
            // Clear form cache when fields change
            clearFormCache();
            
            // Update header when assessment date or facility name changes
            if (fieldName === 'assessment_date' || fieldName === 'hotel_name') {
                updateHeader();
            }
            const fieldType = field.tagName.toLowerCase();

            // Skip if field is not relevant for analysis
            if (!fieldName || fieldName.includes('viewport') || fieldName.includes('hotel_')) {
                return;
            }

            // Perform dynamic analysis
            dynamicAnalyzer.analyzeFieldChange(fieldName, fieldValue, fieldType);
        }

        // Notification System Functions
        function showNotification(type, title, message, duration = 5000) {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            const notificationId = 'notification-' + Date.now();
            
            // Set notification type and content
            notification.className = `notification ${type}`;
            notification.id = notificationId;
            
            // Get appropriate icon for type
            let icon = 'ℹ';
            switch(type) {
                case 'success':
                    icon = '✅';
                    break;
                case 'warning':
                    icon = '⚠';
                    break;
                case 'error':
                    icon = '❌';
                    break;
                case 'info':
                    icon = 'ℹ';
                    break;
            }
            
            notification.innerHTML = `
                <div class="notification-header">
                    <h4 class="notification-title">
                        <span class="notification-icon">${icon}</span>
                        ${title}
                    </h4>
                    <button class="notification-close" onclick="hideNotification('${notificationId}')">&times;</button>
                </div>
                <p class="notification-message">${message}</p>
            `;
            
            // consider to container
            container.appendChild(notification);
            
            // Trigger slide-in animation
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            // Auto-hide for non-error notifications
            if (type !== 'error') {
                setTimeout(() => {
                    hideNotification(notificationId);
                }, duration);
            }
        }
        
        function hideNotification(notificationId) {
            const notification = document.getElementById(notificationId);
            if (notification) {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }
        }
        
        // Convenience functions for different notification types
        function showSuccessNotification(title, message, duration = 3000) {
            showNotification('success', title, message, duration);
        }
        
        function showWarningNotification(title, message, duration = 4000) {
            showNotification('warning', title, message, duration);
        }
        
        function showErrorNotification(title, message) {
            showNotification('error', title, message, 0); // No auto-hide for errors
        }
        
        function showInfoNotification(title, message, duration = 3000) {
            showNotification('info', title, message, duration);
        }

</script>
